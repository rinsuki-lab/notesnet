input CreateNewNoteInput {
  attributes: JSON!
  content: JSON!
  contentType: String!
  scopeId: ID!
  startedAt: DateTime
  summary: String
  textForSearch: String!
  writtenAt: DateTime
}

"""
A date-time string at UTC, such as 2007-12-03T10:15:30Z, compliant with the `date-time` format outlined in section 5.6 of the RFC 3339 profile of the ISO 8601 standard for representation of dates and times using the Gregorian calendar.This scalar is serialized to a string in ISO 8601 format and parsed from a string in ISO 8601 format.
"""
scalar DateTime

"""
The `JSON` scalar type represents JSON values as specified by [ECMA-404](http://www.ecma-international.org/publications/files/ECMA-ST/ECMA-404.pdf).
"""
scalar JSON

type Mutation {
  createNewNote(input: CreateNewNoteInput!): Note!
}

type Note {
  external: NoteExternal
  id: ID!
  latestRevision: NoteRevision
  parents: [NoteRelation!]!
}

type NoteExternal {
  id: String!
  service: String!
}

type NoteRelation {
  child: Note
  parent: Note
}

type NoteRevision {
  attributes: JSON!
  content: JSON!
  contentType: String!
  id: ID!
  insertedAt: DateTime!
  startedAt: DateTime
  summary: String
  textForSearch: String!
  writtenAt: DateTime!
}

type Query {
  note(id: ID!): Note
  recentNotes: [Note!]!
  viewer: Viewer!
}

type Scope {
  id: ID!
  name: String!
  permissions: ScopePermission
}

type ScopePermission {
  canAddTheirNotesToChild: Boolean!
  canModifyNotes: Boolean!
  canReadNoteRevisions: Boolean!
}

type Viewer {
  id: ID!
  name: String!
  scopes: [Scope!]!
}
